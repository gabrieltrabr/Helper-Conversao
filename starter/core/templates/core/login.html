<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Login - Gestão de Obras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-building text-primary" style="font-size: 3rem;"></i>
                <h4 class="mt-2 fw-bold">Acesso ao Sistema</h4>
                <p class="text-muted small">Faça login para continuar</p>
            </div>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Usuário</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger py-2 small" role="alert">
                        Usuário ou senha incorretos. Tente novamente.
                    </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100 fw-bold">
                    Entrar <i class="bi bi-box-arrow-in-right ms-1"></i>
                </button>
            </form>
        </div>
    </div>

</body>
</html>
