<!DOCTYPE html>
<style>
    .minha-sidebar {
    width: 280px;
    min-height: 100vh;
    transition: transform 0.3s ease-in-out;
}

#menu-toggle { display: none; }
.cabecalho-mobile { display: none; }

/* Telas menores que 768px */
@media (max-width: 767px) {
    .cabecalho-mobile {
        display: flex;
    }

    .minha-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1050;
        transform: translateX(-100%);
        background-color: white !important;
        box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    }

    #menu-toggle:checked ~ .wrapper-principal .minha-sidebar {
        transform: translateX(0);
    }
}
</style>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Condomínio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <input type="checkbox" id="menu-toggle">

    <div class="cabecalho-mobile justify-content-between align-items-center bg-dark p-3 text-white shadow-sm">
        <h5 class="mb-0 m-0">Gestão Braços</h5>
        
        <label for="menu-toggle" class="btn btn-dark border border-secondary mb-0 p-1 px-2" style="cursor: pointer;">
            <i class="bi bi-list fs-4"></i>
        </label>
    </div>

    <div class="d-flex wrapper-principal">
        
        <nav class="minha-sidebar bg-dark border-end d-flex flex-column p-3">
            
            <div class="d-md-none text-end mb-3">
                <label for="menu-toggle" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-x-lg"></i> Fechar
                </label>
            </div>

            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none">
                <span class="fs-4 fw-bold text-white">🏙Menu</span>
            </a>
            <hr>
            
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="{% url 'index' %}" class="nav-link active">Condomínios</a>
                </li>
                </ul>
            <hr>
            
            <div class="d-flex align-items-center text-decoration-none">
                <div class="w-100">
                    <p class="mb-1 fw-bold text-white small"><i class="bi bi-person-circle me-1"></i> {{ user.username }}</p>
                    
                    <form method="POST" action="{% url 'logout' %}" class="m-0 p-0 w-100">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-danger w-100 mt-2 text-start">
                            <i class="bi bi-box-arrow-left me-1"></i> Sair do Sistema
                        </button>
                    </form>
                </div>
            </div>
        </nav>
    
        <main class="flex-grow-1 p-4" style="max-height: 100vh; overflow-y: auto;">
            {% block conteudo %}
            {% endblock %}
        </main>

    </div>
</body>
</html>
