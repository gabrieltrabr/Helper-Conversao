<!DOCTYPE html>
<style>
    .minha-sidebar {
    width: 280px;
    min-height: 100vh;
    transition: transform 0.3s ease-in-out;
}

/* Ocultar o checkbox mestre e o cabeçalho mobile no PC */
#menu-toggle { display: none; }
.cabecalho-mobile { display: none; }

/* REGRAS APENAS PARA CELULARES E TABLETS (Telas menores que 768px) */
@media (max-width: 767px) {
    /* 1. Mostra o cabeçalho escuro com o botão de hambúrguer */
    .cabecalho-mobile {
        display: flex;
    }

    /* 2. Arranca a sidebar do grid e esconde ela para a esquerda da tela */
    .minha-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1050; /* Garante que fique por cima de tudo */
        transform: translateX(-100%); /* Joga 100% da largura para fora da tela */
        background-color: white !important;
        box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    }

    /* 3. A MÁGICA: Se o checkbox for marcado, a sidebar volta pra posição 0 (desliza pra dentro) */
    #menu-toggle:checked ~ .wrapper-principal .minha-sidebar {
        transform: translateX(0);
    }
}
</style>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Condomínio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <input type="checkbox" id="menu-toggle">

    <div class="cabecalho-mobile justify-content-between align-items-center bg-dark p-3 text-white shadow-sm">
        <h5 class="mb-0 m-0">Gestão Braços</h5>
        
        <label for="menu-toggle" class="btn btn-dark border border-secondary mb-0 p-1 px-2" style="cursor: pointer;">
            <i class="bi bi-list fs-4"></i>
        </label>
    </div>

    <div class="d-flex wrapper-principal">
        
        <nav class="minha-sidebar bg-dark border-end d-flex flex-column p-3">
            
            <div class="d-md-none text-end mb-3">
                <label for="menu-toggle" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-x-lg"></i> Fechar
                </label>
            </div>

            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none">
                <span class="fs-4 fw-bold text-white">🏙Menu</span>
            </a>
            <hr>
            
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="{% url 'index' %}" class="nav-link active">Condomínios</a>
                </li>
                </ul>
        </nav>

        <main class="flex-grow-1 p-4" style="max-height: 100vh; overflow-y: auto;">
            {% block conteudo %}
            {% endblock %}
        </main>

    </div>
</body>
</html>
